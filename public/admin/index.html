<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Header -->
  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold text-gray-800">用户管理</h1>
      <button
        id="logoutBtn"
        class="text-gray-600 hover:text-gray-800 transition-colors"
      >
        登出
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-6">
    <!-- Batch Actions -->
    <div id="batchActions" class="mb-4 flex gap-2 hidden">
      <button
        id="batchApproveBtn"
        class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition-colors"
      >
        批量批准
      </button>
      <button
        id="batchRejectBtn"
        class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 transition-colors"
      >
        批量拒绝
      </button>
      <span id="selectedCount" class="text-gray-600 py-2"></span>
    </div>

    <!-- User Table -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left">
              <input type="checkbox" id="selectAll" class="rounded">
            </th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">用户名</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">邮箱</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">注册时间</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
          </tr>
        </thead>
        <tbody id="userTableBody" class="bg-white divide-y divide-gray-200">
          <!-- Users will be rendered here -->
        </tbody>
      </table>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-12 text-gray-500">
      暂无用户
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="text-center py-12 text-gray-500">
      加载中...
    </div>
  </main>

  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) {
      window.location.href = 'login.html';
    }

    const userTableBody = document.getElementById('userTableBody');
    const emptyState = document.getElementById('emptyState');
    const loadingState = document.getElementById('loadingState');
    const batchActions = document.getElementById('batchActions');
    const selectedCount = document.getElementById('selectedCount');
    const selectAllCheckbox = document.getElementById('selectAll');
    const logoutBtn = document.getElementById('logoutBtn');
    const batchApproveBtn = document.getElementById('batchApproveBtn');
    const batchRejectBtn = document.getElementById('batchRejectBtn');

    let users = [];
    let selectedUserIds = new Set();

    async function fetchUsers() {
      try {
        const response = await fetch('/api/admin/users', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.status === 401) {
          localStorage.removeItem('adminToken');
          window.location.href = 'login.html';
          return;
        }

        const data = await response.json();
        users = data.users || [];
        renderUsers();
      } catch (err) {
        console.error('Failed to fetch users:', err);
        alert('加载用户列表失败');
      } finally {
        loadingState.classList.add('hidden');
      }
    }

    function renderUsers() {
      userTableBody.innerHTML = '';

      if (users.length === 0) {
        emptyState.classList.remove('hidden');
        return;
      }

      users.forEach(user => {
        const tr = document.createElement('tr');
        tr.className = user.isApproved ? '' : 'bg-yellow-50';

        const statusBadge = user.isApproved
          ? '<span class="px-2 py-1 text-xs rounded bg-green-100 text-green-800">已批准</span>'
          : '<span class="px-2 py-1 text-xs rounded bg-yellow-100 text-yellow-800">待批准</span>';

        const actionButtons = user.isApproved
          ? `<button onclick="rejectUser('${user.id}')" class="text-red-600 hover:text-red-800">拒绝</button>`
          : `<button onclick="approveUser('${user.id}')" class="text-green-600 hover:text-green-800 mr-2">批准</button>
             <button onclick="rejectUser('${user.id}')" class="text-red-600 hover:text-red-800">拒绝</button>`;

        tr.innerHTML = `
          <td class="px-4 py-3">
            <input type="checkbox" class="user-checkbox rounded" data-id="${user.id}">
          </td>
          <td class="px-4 py-3 text-sm text-gray-900">${escapeHtml(user.username)}</td>
          <td class="px-4 py-3 text-sm text-gray-500">${escapeHtml(user.email || '-')}</td>
          <td class="px-4 py-3">${statusBadge}</td>
          <td class="px-4 py-3 text-sm text-gray-500">${formatDate(user.createdAt)}</td>
          <td class="px-4 py-3 text-sm">${actionButtons}</td>
        `;

        userTableBody.appendChild(tr);
      });

      // Add checkbox listeners
      document.querySelectorAll('.user-checkbox').forEach(cb => {
        cb.addEventListener('change', updateSelection);
      });
    }

    function updateSelection() {
      selectedUserIds.clear();
      document.querySelectorAll('.user-checkbox:checked').forEach(cb => {
        selectedUserIds.add(cb.dataset.id);
      });

      if (selectedUserIds.size > 0) {
        batchActions.classList.remove('hidden');
        selectedCount.textContent = `已选择 ${selectedUserIds.size} 个用户`;
      } else {
        batchActions.classList.add('hidden');
      }

      // Update select all checkbox
      const allCheckboxes = document.querySelectorAll('.user-checkbox');
      const checkedCheckboxes = document.querySelectorAll('.user-checkbox:checked');
      selectAllCheckbox.checked = allCheckboxes.length > 0 && allCheckboxes.length === checkedCheckboxes.length;
      selectAllCheckbox.indeterminate = checkedCheckboxes.length > 0 && checkedCheckboxes.length < allCheckboxes.length;
    }

    selectAllCheckbox.addEventListener('change', () => {
      const checkboxes = document.querySelectorAll('.user-checkbox');
      checkboxes.forEach(cb => {
        cb.checked = selectAllCheckbox.checked;
      });
      updateSelection();
    });

    async function approveUser(userId) {
      if (!confirm('确定要批准该用户吗？')) return;

      try {
        const response = await fetch('/api/admin/users/approve', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ userIds: [userId] })
        });

        const data = await response.json();
        if (response.ok && data.ok) {
          await fetchUsers();
        } else {
          alert(data.error || '操作失败');
        }
      } catch (err) {
        alert('网络错误');
      }
    }

    async function rejectUser(userId) {
      if (!confirm('确定要拒绝该用户吗？此操作将删除用户账户，不可恢复。')) return;

      try {
        const response = await fetch('/api/admin/users/reject', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ userIds: [userId] })
        });

        const data = await response.json();
        if (response.ok && data.ok) {
          await fetchUsers();
        } else {
          alert(data.error || '操作失败');
        }
      } catch (err) {
        alert('网络错误');
      }
    }

    async function batchApprove() {
      if (selectedUserIds.size === 0) return;
      if (!confirm(`确定要批量批准 ${selectedUserIds.size} 个用户吗？`)) return;

      try {
        const response = await fetch('/api/admin/users/approve', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ userIds: Array.from(selectedUserIds) })
        });

        const data = await response.json();
        if (response.ok && data.ok) {
          selectAllCheckbox.checked = false;
          await fetchUsers();
        } else {
          alert(data.error || '操作失败');
        }
      } catch (err) {
        alert('网络错误');
      }
    }

    async function batchReject() {
      if (selectedUserIds.size === 0) return;
      if (!confirm(`确定要批量拒绝 ${selectedUserIds.size} 个用户吗？此操作将删除用户账户，不可恢复。`)) return;

      try {
        const response = await fetch('/api/admin/users/reject', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ userIds: Array.from(selectedUserIds) })
        });

        const data = await response.json();
        if (response.ok && data.ok) {
          selectAllCheckbox.checked = false;
          await fetchUsers();
        } else {
          alert(data.error || '操作失败');
        }
      } catch (err) {
        alert('网络错误');
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('adminToken');
      window.location.href = 'login.html';
    });

    batchApproveBtn.addEventListener('click', batchApprove);
    batchRejectBtn.addEventListener('click', batchReject);

    // Make functions available globally for onclick handlers
    window.approveUser = approveUser;
    window.rejectUser = rejectUser;

    // Initialize
    fetchUsers();
  </script>
</body>
</html>
